<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Farm Direct</title>
    <link rel="stylesheet" href="css/style.css?v=7">
    <link rel="icon" type="image/png" href="images/brand.png?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <img src="images/brand.png" alt="Farm Direct" style="height: 100px; margin-bottom: 0; object-fit: contain;">
        <h2 style="margin-top: 0;">Create Account</h2>
        <p>Join our community of farmers and consumers</p>

        <!-- fallback form action for non-JS clients -->
        <form id="registerForm" action="/api/auth/register" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" name="email" required placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>I want to join as:</label>
                <select id="role" name="role">
                    <option value="CUSTOMER">Customer</option>
                    <option value="FARMER">Farmer</option>
                </select>
            </div>
            <div id="farmerFields" style="display:none;">
                <div class="form-group">
                    <label>Farm Name</label>
                    <input type="text" id="farmName" name="farmName" placeholder="e.g., Green Valley Farms">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="state" name="state" placeholder="State">
                </div>
                <div class="form-group">
                    <label>District</label>
                    <input type="text" id="district" name="district" placeholder="District">
                </div>
                <div class="form-group">
                    <label>Pickup Address (Required for Farmer)</label>
                    <input type="text" id="pickupAddress" name="pickupAddress" placeholder="Farm/shop pickup address">
                </div>
            </div>
            <button type="submit" class="btn-primary">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a href="signin.html">Login here</a></p>
        <p class="auth-link"><a href="index.html">Back to Home</a></p>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
