<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile - Farm Direct</title>
    <link rel="stylesheet" href="css/style.css?v=7">
    <link rel="icon" type="image/png" href="images/brand.png?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container" style="max-width: 1100px;">
        <div id="profileCard"
            style="background:white; padding:2rem; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display:flex; gap:1.5rem; flex-wrap:wrap;">
            <div style="width:140px; height:140px; border-radius:12px; overflow:hidden; background:#f4f4f4;">
                <img id="farmerPhoto" src="https://placehold.co/200x200?text=Farmer" alt="Farmer"
                    style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="flex:1; min-width: 260px;">
                <div style="display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
                    <div>
                        <h2 id="farmerName" style="margin:0;">Loading...</h2>
                        <div id="farmName" style="color:#666; margin-top:0.25rem;"></div>
                        <div id="location" style="color:#666; margin-top:0.25rem;"></div>
                        <div id="pickupAddress" style="color:#666; margin-top:0.25rem;"></div>
                        <div id="ratingLine" style="margin-top:0.5rem;"></div>
                    </div>
                    <div id="profileActions" style="display:flex; align-items:flex-start; gap:0.5rem;"></div>
                </div>

                <div style="margin-top:1rem;">
                    <div style="font-weight:700; color:#2e7d32; margin-bottom:0.25rem;">Story</div>
                    <div id="story" style="color:#444; white-space:pre-wrap;">Loading...</div>
                </div>
            </div>
        </div>

        <div style="margin-top:2rem; display:grid; grid-template-columns: 2fr 1fr; gap:2rem; align-items:start;">
            <div style="background:white; padding:1.5rem; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h3 style="margin-top:0;">Products</h3>
                <div id="products" class="product-grid" style="margin-top:1rem;">
                    <p>Loading products...</p>
                </div>
            </div>

            <div style="background:white; padding:1.5rem; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h3 style="margin-top:0;">Ratings & Reviews</h3>
                <div id="reviews">
                    <p>Loading reviews...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js?v=8"></script>
    <script src="js/nav.js"></script>
    <script>
        const qs = new URLSearchParams(window.location.search);
        const farmerId = qs.get('id');
        let farmerUser = null;

        function renderStars(avg, count) {
            if (!count || count === 0) return `<div style="font-size:0.9rem; color:#888;">No reviews yet</div>`;
            return `<div style="font-size:0.95rem; display:flex; align-items:center; gap:6px;">
                <span class="rating-stars">★</span>
                <span style="font-weight:700; color:#fd7e14;">${Number(avg || 0).toFixed(1)}</span>
                <span style="color:#666;">(${count})</span>
            </div>`;
        }

        async function loadProfile() {
            if (!farmerId) { alert('Farmer not found'); window.location.href = 'index.html'; return; }
            try {
                const res = await fetch(`/api/farmer/profile/${farmerId}`);
                const profile = res.ok ? await res.json() : null;

                // Pull farmer's basic user info from any product / review response
                // (profile only has user + fields)
                if (profile && profile.user) farmerUser = profile.user;

                document.getElementById('farmerName').innerText = farmerUser ? farmerUser.name : 'Farmer';
                document.getElementById('farmName').innerText = profile && profile.farmName ? profile.farmName : '';
                const loc = profile ? [profile.district, profile.state].filter(Boolean).join(', ') : '';
                document.getElementById('location').innerText = loc ? `Location: ${loc}` : '';
                document.getElementById('pickupAddress').innerText = (profile && profile.pickupAddress) ? `Pickup Address: ${profile.pickupAddress}` : '';
                document.getElementById('story').innerText = (profile && profile.story) ? profile.story : 'No story added yet.';
                document.getElementById('farmerPhoto').src = (profile && profile.photoUrl) ? profile.photoUrl : 'https://placehold.co/200x200?text=Farmer';

                const avg = farmerUser ? farmerUser.averageRating : 0;
                const count = farmerUser ? farmerUser.ratingCount : 0;
                document.getElementById('ratingLine').innerHTML = renderStars(avg, count);

                const viewer = JSON.parse(localStorage.getItem('user'));
                const actions = document.getElementById('profileActions');
                actions.innerHTML = '';
                if (viewer && viewer.role === 'CUSTOMER') {
                    actions.innerHTML = `
                        <button class="btn-primary" style="width:auto; padding:0.6rem 1rem;" onclick="window.location.href='chat.html?farmerId=${farmerId}'">Message</button>
                    `;
                }
            } catch (e) { console.error(e); }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`/api/products/farmer/${farmerId}`);
                const list = await res.json();
                const products = (list || []).filter(p => p.status !== 'OUT_OF_STOCK'); // keep profile clean
                const container = document.getElementById('products');
                if (!products || products.length === 0) {
                    container.innerHTML = '<p style="grid-column:1/-1; color:#666;">No products available.</p>';
                    return;
                }
                container.innerHTML = products.map(p => {
                    const unit = p.unit || '';
                    const cover = (p.imageUrls && p.imageUrls.length > 0) ? p.imageUrls[0] : (p.imageUrl || 'https://placehold.co/400x300?text=Product');
                    const moq = p.minOrderQuantity || 1;
                    const statusText = p.status === 'PAUSED' ? 'Paused' : 'In season';
                    const statusColor = p.status === 'PAUSED' ? '#fd7e14' : '#2e7d32';
                    return `
                        <div class="product-card">
                            <a href="product-details.html?id=${p.id}" style="text-decoration:none; color:inherit;">
                                <img src="${cover}" class="product-img" onerror="this.src='https://placehold.co/400x300?text=Product'">
                            </a>
                            <div class="product-info">
                                <div class="product-title">${p.name}</div>
                                <div style="font-size:0.85rem; color:#555; margin:0.25rem 0 0.5rem 0;">
                                    ${p.description ? p.description : 'No description provided'}
                                </div>
                                <div class="product-price">₹${p.price} / ${unit}</div>
                                <div style="font-size:0.85rem; color:#666; margin-top:0.25rem;">Stock: ${p.quantity} ${unit}</div>
                                <div style="font-size:0.85rem; color:#666;">Min order: ${moq} ${unit}</div>
                                <div style="font-size:0.8rem; margin-top:0.5rem; color:${statusColor}; font-weight:700;">${statusText}</div>
                                <div style="margin-top:0.75rem;">
                                    <button class="btn-primary" style="width:100%;" onclick="window.location.href='product-details.html?id=${p.id}'">View</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function loadReviews() {
            try {
                const res = await fetch(`/api/reviews/farmer/${farmerId}`);
                const reviews = await res.json();
                const container = document.getElementById('reviews');
                if (!reviews || reviews.length === 0) {
                    container.innerHTML = '<p style="color:#666;">No reviews yet.</p>';
                    return;
                }
                container.innerHTML = reviews.slice(0, 8).map(r => `
                    <div style="border-bottom:1px solid #eee; padding:0.75rem 0;">
                        <div style="display:flex; justify-content:space-between; gap:1rem;">
                            <div style="font-weight:700;">${r.customer ? r.customer.name : 'Customer'}</div>
                            <div style="color:#fd7e14; font-weight:700;">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                        </div>
                        <div style="color:#555; margin-top:0.25rem;">${r.comment || ''}</div>
                        <div style="font-size:0.8rem; color:#999; margin-top:0.25rem;">${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : ''}</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        loadProfile();
        loadProducts();
        loadReviews();
    </script>
</body>

</html>
